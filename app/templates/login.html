<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tower Scan Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=9">
</head>

<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg" style="background: var(--card-bg); width: 400px;">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="bi bi-broadcast-pin"></i> Tower Scan Automation</h4>
                <small>Cambium PMP 450i - Analizador de Frecuencias</small>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label text-light">Usuario</label>
                        <input type="text" name="username"
                            class="form-control bg-dark text-light border-secondary"
                            required autofocus autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Contrasena</label>
                        <input type="password" name="password"
                            class="form-control bg-dark text-light border-secondary"
                            required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion
                    </button>
                </form>
            </div>
            <div class="card-footer text-center text-muted small border-0">
                Tower Scan Automation v2
            </div>
        </div>
    </div>
</body>

</html>
