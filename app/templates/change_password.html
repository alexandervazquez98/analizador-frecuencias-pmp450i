<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contrasena - Tower Scan Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=9">
</head>

<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg" style="background: var(--card-bg); width: 440px;">
            <div class="card-header bg-warning text-dark text-center">
                <h4 class="mb-0"><i class="bi bi-shield-lock"></i> Cambiar Contrasena</h4>
                <small>Debe cambiar su contrasena antes de continuar</small>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <form method="POST" action="/change-password">
                    <div class="mb-3">
                        <label class="form-label text-light">Contrasena actual</label>
                        <input type="password" name="current_password"
                            class="form-control bg-dark text-light border-secondary"
                            required autofocus autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Nueva contrasena</label>
                        <input type="password" name="new_password"
                            class="form-control bg-dark text-light border-secondary"
                            required minlength="6" autocomplete="new-password">
                        <div class="form-text text-muted" style="font-size: 0.75em;">
                            Minimo 6 caracteres
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Confirmar nueva contrasena</label>
                        <input type="password" name="confirm_password"
                            class="form-control bg-dark text-light border-secondary"
                            required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">
                        <i class="bi bi-check-circle"></i> Cambiar Contrasena
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="/logout" class="text-muted small"><i class="bi bi-box-arrow-left"></i> Cerrar sesion</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
