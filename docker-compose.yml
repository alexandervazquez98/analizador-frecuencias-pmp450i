services:
  tower-scan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tower-scan-automation-V2
    ports:
      - "5002:5000"
    environment:
      - FLASK_APP=app.web_app
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY}
      # Parámetros de escaneo (leídos desde .env del host)
      - SNMP_COMMUNITIES=${SNMP_COMMUNITIES}
      - DEFAULT_TARGET_RX_LEVEL=${DEFAULT_TARGET_RX_LEVEL}
      - DEFAULT_MIN_SNR=${DEFAULT_MIN_SNR}
      - DEFAULT_MAX_POLARIZATION_DIFF=${DEFAULT_MAX_POLARIZATION_DIFF}
      - DEFAULT_CHANNEL_WIDTH=${DEFAULT_CHANNEL_WIDTH}
      # cnMaestro API (deprecated: replaced by SNMP auto-discovery in ap-sm-autodiscovery)
      # - CNMAESTRO_URL=${CNMAESTRO_URL}
      # - CNMAESTRO_ID=${CNMAESTRO_ID}
      # - CNMAESTRO_SECRET=${CNMAESTRO_SECRET}
      # Base de datos unificada (v3.0.0 — reemplaza AUTH_DB_PATH + STORAGE_FILE_PATH)
      - DB_PATH=/app/data/analyzer.db
      # Zona horaria del contenedor (Issue #8 — sincronizar con host)
      - TZ=${TZ:-America/Mexico_City}
    volumes:
      # Mapear código fuente para desarrollo
      - ./app:/app/app
      - ./static:/app/static
      # Mapear carpeta de logs
      - ./logs:/app/logs
      # Persistent data (SQLite unified DB: analyzer.db)
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - tower-scan-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  tower-scan-network:
    driver: bridge

volumes:
  logs:
    driver: local
